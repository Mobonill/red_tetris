services:
  traefik:
    # UPDATED: v3.6 fixed the Docker API negotiation bug
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    environment:
      - ./.env
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=red_tetris_network"
      - "--entrypoints.web.address=:8080"
      - "--entrypoints.traefik.address=:8081"
    ports:
      # - "80:8080"
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ${XDG_RUNTIME_DIR}/docker.sock:/var/run/docker.sock:ro
    networks:
      - red_tetris_network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: red_tetris_server
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    labels:
      - "traefik.enable=true"
      # Rule: Route /api and /socket.io to Express
      - "traefik.http.routers.server.rule=Host(`localhost`) && (PathPrefix(`/api`) || PathPrefix(`/socket.io`))"
      - "traefik.http.routers.server.entrypoints=web"
      - "traefik.http.services.server.loadbalancer.server.port=3000"
      - "traefik.docker.network=red_tetris_network"
    networks:
      - red_tetris_network
    restart: unless-stopped

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: red_tetris_webapp
    expose:
      - "5173"
    labels:
      - "traefik.enable=true"
      # Rule: Catch everything else (the React app)
      - "traefik.http.routers.webapp.rule=Host(`localhost`)"
      - "traefik.http.routers.webapp.entrypoints=web"
      - "traefik.http.services.webapp.loadbalancer.server.port=5173"
      - "traefik.http.routers.webapp.priority=1" # Lower priority so /api takes precedence
      - "traefik.docker.network=red_tetris_network"
    networks:
      - red_tetris_network
    restart: unless-stopped

networks:
  red_tetris_network:
    driver: bridge